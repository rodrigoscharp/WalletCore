services:
  postgres:
    image: postgres:16-alpine
    container_name: walletcore-postgres
    environment:
      POSTGRES_DB: walletcore
      POSTGRES_USER: walletcore
      POSTGRES_PASSWORD: walletcore_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walletcore"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: walletcore-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: walletcore
      RABBITMQ_DEFAULT_PASS: walletcore_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: walletcore-redis
    command: redis-server --requirepass walletcore_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "walletcore_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
